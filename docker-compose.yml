services:
  # 1. THE BRAIN (Ollama with GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: lifesync_brain
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - MONGODB_URI=${MONGODB_URI}
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - lifesync_net
    restart: always

  # 2. THE TUNNEL (Cloudflare)
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

  # 3. THE ORCHESTRATOR (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: lifesync_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=fahim-n8n.laddu.cc
      - WEBHOOK_URL=${WEBHOOK_URL}
      - MONGODB_URI=${MONGODB_URI}
      - GENERIC_TIMEZONE=Asia/Taipei
      - N8N_CORS_ALLOWED_ORIGINS=*
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - lifesync_net
    restart: always

  # 4. THE LOCAL MEMORY (MongoDB)
  mongodb:
    image: mongo:latest
    container_name: lifesync_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db
    networks:
      - lifesync_net
    restart: always

  # 5. THE EAR (Faster-Whisper with GPU)
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-gpu
    container_name: lifesync_whisper
    ports:
      - "8000:9000"
    environment:
      - ASR_MODEL=medium.en
      - ASR_ENGINE=faster_whisper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - whisper_models:/root/.cache/huggingface
    networks:
      - lifesync_net
    restart: always

# Define the persistent storage volumes
volumes:
  ollama_storage:
  n8n_storage:
  mongo_storage:
  whisper_models:

networks:
  lifesync_net:
    driver: bridge