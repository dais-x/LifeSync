version: '3.8'

services:
  # 1. THE BRAIN (Ollama with GPU)
  ollama:
    image: ollama/ollama:latest
    container_name: lifesync_brain
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - MONGODB_URL=${MONGODB_URL}  # Added: Now the brain knows about Atlas
    volumes:
      - ollama_storage:/root/.ollama
    networks:
      - lifesync_net
    restart: always

  # 2. THE TUNNEL (Cloudflare)
  # Fixed: Moved this out (it was nested inside ollama before)
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    network_mode: host
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}

  # 3. THE ORCHESTRATOR (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: lifesync_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=fahim-n8n.laddu.cc
      - WEBHOOK_URL=${WEBHOOK_URL}  # Fixed: Uses your .env value (https://fahim-n8n...)
      - MONGODB_URL=${MONGODB_URL}  # Added: Gives n8n access to the variable if needed
      - GENERIC_TIMEZONE=Asia/Taipei
      - N8N_CORS_ALLOWED_ORIGINS=http://localhost:5173
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - lifesync_net
    restart: always

  # 4. THE LOCAL MEMORY (MongoDB)
  # Note: You are using Atlas now, but we keep this running just in case
  # you have old local data you need to access later.
  mongodb:
    image: mongo:latest
    container_name: lifesync_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db
    networks:
      - lifesync_net
    restart: always

# Define the persistent storage volumes
volumes:
  ollama_storage:
  n8n_storage:
  mongo_storage:

networks:
  lifesync_net:
    driver: bridge
